apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: todo-app
type: Opaque
data:
  # These are BASE64 encoded values, NOT plain text
  # To encode:  echo -n 'yourvalue' | base64
  # To decode:  echo 'encodedvalue' | base64 -d
  #
  # admin = YWRtaW4=
  # password123 = cGFzc3dvcmQxMjM=
  mongo-username: YWRtaW4=
  mongo-password: cGFzc3dvcmQxMjM=