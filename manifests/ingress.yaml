apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: todo-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # NO rewrite-target here
    # We want URLs to pass through to backend unchanged
    # Browser sends /api/todos → backend receives /api/todos → Express matches ✅
spec:
  rules:
    - host: todo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000

# Why not NodePort for everything? NodePort exposes a random high port (30000-32767) per service. You'd have IP:31234 for frontend and IP:30891 for backend — ugly and hard to manage. Ingress gives you one clean URL with path-based routing.

# Step 1 — User opens the app
# User types: http://todo.local
#       ↓
#    Ingress
#    (path: / → frontend-service)
#       ↓
#    Frontend Pod (Nginx.conf)
#    serves index.html + CSS + JS
#       ↓
#    Browser renders the Todo App UI
# Step 2 — JavaScript makes an API call
# User clicks "Add Todo" button
#       ↓
#    Browser JavaScript executes:
#    fetch('/api/todos', { method: 'POST', ... })
#       ↓
#    Browser sees relative URL '/api/todos'
#    Browser automatically prepends the current host
#    So actual request goes to: http://todo.local/api/todos
#       ↓
#    Ingress
#    (path: /api → backend-service)
#       ↓
#    Backend Pod (Express)
#    processes the request, saves to MongoDB
#       ↓
#    Returns JSON response to browser
#       ↓
#    JavaScript updates the UI